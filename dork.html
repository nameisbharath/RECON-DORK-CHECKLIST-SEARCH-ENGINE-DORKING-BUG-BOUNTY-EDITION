<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recon Dork Checklist</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0e1a;color:#e0e6ff;font-family:'Courier New',monospace;padding:20px;min-height:100vh}
  h1{text-align:center;font-size:26px;color:#7df9ff;letter-spacing:2px;text-shadow:0 0 20px #7df9ff88;margin-bottom:4px}
  .subtitle{text-align:center;font-size:11px;color:#556;letter-spacing:3px;margin-bottom:20px}
  .controls{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  input,select{background:#0f1629;border:1px solid #1e2d5a;border-radius:6px;padding:10px 14px;color:#7df9ff;font-size:13px;outline:none;font-family:inherit}
  input{flex:1;min-width:200px}
  input::placeholder{color:#445}
  select{cursor:pointer}
  .filter-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .filter-row input{color:#e0e6ff;font-size:12px;padding:8px 12px}
  button{cursor:pointer;font-family:inherit;border-radius:6px;font-size:12px}
  .btn-filter{background:#0f1629;border:1px solid #1e2d5a;padding:8px 14px;color:#778}
  .btn-filter.active{background:#1a2d5a;border-color:#7df9ff;color:#7df9ff}
  .btn-reset{background:#0f1629;border:1px solid #3a1a1a;padding:8px 14px;color:#f87}
  .progress-bar-wrap{margin-bottom:20px}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:#556;margin-bottom:5px}
  .progress-label span:last-child{color:#7df9ff}
  .progress-track{background:#0f1629;border-radius:4px;height:6px;border:1px solid #1e2d5a}
  .progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#7df9ff,#4f8eff);transition:width .3s}
  .category{margin-bottom:12px;border:1px solid #1e2d5a;border-radius:8px;overflow:hidden}
  .cat-header{background:#0f1629;padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
  .cat-header:hover{background:#111a30}
  .cat-name{flex:1;font-weight:700;font-size:13px;color:#c5d3ff}
  .engine-tag{font-size:9px;padding:2px 6px;border-radius:3px;background:#1a2040}
  .cat-count{font-size:11px;margin-left:8px}
  .cat-arrow{font-size:11px;color:#556}
  .cat-body{display:none}
  .cat-body.open{display:block}
  .insight{margin:8px 14px 10px;padding:8px 12px;background:#0a0f20;border-left:3px solid #2a3d8a;border-radius:0 4px 4px 0;font-size:11px;color:#778;line-height:1.5}
  .cat-prog{margin:0 14px 10px;height:3px;background:#0f1629;border-radius:2px}
  .cat-prog-fill{height:100%;border-radius:2px;background:#4f8eff;transition:width .3s}
  .dork-row{display:flex;align-items:center;gap:8px;padding:6px 14px;border-bottom:1px solid #0f1629}
  .dork-row.done{background:#0a1a12}
  .dork-row input[type=checkbox]{accent-color:#4fffb0;width:15px;height:15px;cursor:pointer;flex-shrink:0}
  .dork-info{flex:1;min-width:0}
  .dork-label{font-size:12px;color:#c5d3ff;font-weight:600}
  .dork-row.done .dork-label{color:#4fffb0}
  .dork-query{font-size:10px;color:#445;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .btn-copy{background:#1a2040;border:1px solid #2a3d8a;padding:4px 8px;color:#7df9ff;flex-shrink:0}
  .btn-open{background:#1a2040;padding:4px 8px;flex-shrink:0}
  .footer{text-align:center;font-size:10px;color:#334;margin-top:24px;letter-spacing:2px}
  ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:#0a0e1a} ::-webkit-scrollbar-thumb{background:#1e2d5a;border-radius:3px}
</style>
</head>
<body>

<h1>🔍 RECON DORK CHECKLIST</h1>
<div class="subtitle">SEARCH ENGINE DORKING · BUG BOUNTY EDITION</div>

<div class="controls">
  <input type="text" id="target" placeholder="Enter target domain (e.g. example.com)" oninput="render()"/>
  <select id="engine" onchange="render()" style="color:#7df9ff"></select>
</div>
<div class="filter-row">
  <input type="text" id="search" placeholder="🔎 Filter dorks..." oninput="render()" style="flex:1;min-width:160px"/>
  <button class="btn-filter" id="btnActive" onclick="toggleActive()">All dorks</button>
  <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-label"><span>PROGRESS</span><span id="progLabel"></span></div>
  <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
</div>

<div id="cats"></div>
<div class="footer">FOR AUTHORIZED SECURITY RESEARCH &amp; BUG BOUNTY ONLY · STAY IN SCOPE</div>

<script>
const ENGINE_URLS = {
  Google: q=>`https://www.google.com/search?q=${encodeURIComponent(q)}`,
  Bing: q=>`https://www.bing.com/search?q=${encodeURIComponent(q)}`,
  Yandex: q=>`https://yandex.com/search/?text=${encodeURIComponent(q)}`,
  DuckDuckGo: q=>`https://duckduckgo.com/?q=${encodeURIComponent(q)}`,
  Shodan: q=>`https://www.shodan.io/search?query=${encodeURIComponent(q)}`,
  GitHub: q=>`https://github.com/search?q=${encodeURIComponent(q)}&type=code`,
  Censys: q=>`https://search.censys.io/search?resource=hosts&q=${encodeURIComponent(q)}`,
};
const ENGINE_COLORS={Google:"#4285F4",Bing:"#008373",Yandex:"#FF0000",DuckDuckGo:"#DE5833",Shodan:"#FF3B30",GitHub:"#6E40C9",Censys:"#00C4B4"};
const ENGINES=Object.keys(ENGINE_URLS);

const CATEGORIES=[
  {id:"exposed_files",name:"🗂️ Exposed Files & Docs",engines:["Google","Bing","Yandex","DuckDuckGo"],insight:"HackerOne hunters found confidential docs (NDAs, reports, contracts) on S3 via these. DoD disclosures confirmed.",dorks:[
    {id:"ef1",label:"Config/Env files",q:'site:{target} ext:log | ext:txt | ext:conf | ext:cnf | ext:ini | ext:env | ext:sh | ext:bak | ext:backup | ext:swp | ext:old | ext:git | ext:svn | ext:htpasswd | ext:htaccess | ext:json'},
    {id:"ef2",label:"Office docs (Word/PPT/XLS/PDF)",q:'site:{target} ext:doc | ext:docx | ext:pdf | ext:odt | ext:rtf | ext:ppt | ext:pptx | ext:pps | ext:csv | ext:xls | ext:xlsx'},
    {id:"ef3",label:"Confidential / internal labels",q:'site:{target} intitle:"confidential" | intitle:"internal use only" | intitle:"do not share" | intitle:"restricted"'},
    {id:"ef4",label:"S3 buckets – confidential/top secret",q:'site:s3.amazonaws.com "{target}" confidential | "top secret" | classified | undisclosed'},
    {id:"ef5",label:"NDA & contract docs",q:'site:{target} filetype:pdf intitle:"nda" | intitle:"non-disclosure" | intitle:"agreement" | intitle:"contract"'},
    {id:"ef6",label:"Exposed Excel spreadsheets",q:'site:{target} filetype:xls | filetype:xlsx intext:"password" | intext:"username" | intext:"confidential"'},
    {id:"ef7",label:"Open directory listings",q:'site:{target} intitle:"index of" inurl:/ "parent directory"'},
    {id:"ef8",label:"XML / WSDL service files",q:'site:{target} ext:xml | ext:wsdl | ext:wadl'},
    {id:"ef9",label:"Private keys / certs",q:'site:{target} ext:pem | ext:key | ext:crt | ext:cer | ext:p12 | ext:pfx'},
    {id:"ef10",label:"SQL dumps",q:'site:{target} ext:sql | ext:sql.gz | ext:dump intext:"INSERT INTO"'},
  ]},
  {id:"credentials",name:"🔑 Credentials & Secrets",engines:["Google","GitHub","Bing"],insight:"Bug hunters frequently find hardcoded API keys in GitHub repos and .env files indexed by Google. This is one of the highest-value dork categories on HackerOne.",dorks:[
    {id:"cr1",label:"Password files",q:'site:{target} intext:"password" filetype:txt | filetype:log | filetype:env'},
    {id:"cr2",label:".env files with DB creds",q:'site:{target} filetype:env intext:"DB_PASSWORD" | intext:"DB_USER" | intext:"APP_SECRET"'},
    {id:"cr3",label:"API keys / tokens in JSON",q:'site:{target} filetype:json intext:"api_key" | intext:"access_token" | intext:"secret_key" | intext:"client_secret"'},
    {id:"cr4",label:"GitHub: API keys for target",q:'"{target}" "api_key" | "apikey" | "api_secret" | "access_token" | "secret_key"'},
    {id:"cr5",label:"GitHub: .env committed",q:'"{target}" filename:.env "DB_PASSWORD" | "SECRET" | "API_KEY"'},
    {id:"cr6",label:"GitHub: AWS keys",q:'"{target}" "AKIA" "aws_access_key_id"'},
    {id:"cr7",label:"Exposed htpasswd",q:'site:{target} inurl:".htpasswd" | intext:"htpasswd"'},
    {id:"cr8",label:"Connection strings",q:'site:{target} intext:"connectionString" | intext:"jdbc:mysql" | intext:"mongodb://" | intext:"postgres://"'},
    {id:"cr9",label:"FTP credentials",q:'site:{target} intext:"ftp://" intext:"password"'},
    {id:"cr10",label:"SSH private keys",q:'"{target}" "BEGIN RSA PRIVATE KEY" | "BEGIN OPENSSH PRIVATE KEY"'},
  ]},
  {id:"admin_panels",name:"🖥️ Admin Panels & Login Pages",engines:["Google","Bing","Yandex"],insight:"Hunters on HackerOne use these to find staging/UAT admin panels that are misconfigured or unprotected. Staging envs are a goldmine.",dorks:[
    {id:"ap1",label:"Admin login panels",q:'site:{target} inurl:admin | inurl:login | inurl:portal | inurl:dashboard inurl:admin'},
    {id:"ap2",label:"Staging / dev environments",q:'site:{target} inurl:staging | inurl:uat | inurl:test | inurl:dev | inurl:preprod | inurl:sandbox'},
    {id:"ap3",label:"phpMyAdmin",q:'site:{target} inurl:phpmyadmin | intitle:"phpMyAdmin" "Welcome to phpMyAdmin"'},
    {id:"ap4",label:"Joomla / WordPress admin",q:'site:{target} inurl:/wp-admin | inurl:/wp-login.php | inurl:/joomla/login | inurl:/administrator/index.php'},
    {id:"ap5",label:"Jenkins / CI panels",q:'site:{target} inurl:jenkins | intitle:"Dashboard [Jenkins]"'},
    {id:"ap6",label:"Kibana / Grafana panels",q:'site:{target} inurl:kibana | inurl:grafana | intitle:"Grafana" | intitle:"Kibana"'},
    {id:"ap7",label:"Webmin / cPanel",q:'site:{target} inurl:2082 | inurl:2083 | inurl:10000 intitle:"webmin"'},
    {id:"ap8",label:"Exposed Swagger/API docs",q:'site:{target} inurl:swagger | inurl:api-docs | intitle:"Swagger UI" | inurl:/api/v1'},
    {id:"ap9",label:"Laravel debug mode",q:'site:{target} intext:"Laravel" intitle:"Whoops!" | intitle:"ErrorException"'},
    {id:"ap10",label:"Django admin exposed",q:'site:{target} inurl:/admin/ intitle:"Django"'},
  ]},
  {id:"error_leaks",name:"🚨 Error Messages & Stack Traces",engines:["Google","Bing","DuckDuckGo"],insight:"Stack traces reveal tech stack, DB type, file paths and internal IPs — all used by bug hunters to pivot into deeper recon.",dorks:[
    {id:"er1",label:"SQL errors",q:'site:{target} inurl:"error" | intext:"database error" | intext:"SQL syntax" | intext:"mysql_fetch" | intext:"ORA-"'},
    {id:"er2",label:"Stack traces / exceptions",q:'site:{target} intitle:"exception" | intitle:"failure" | intitle:"server at" | inurl:exception | intext:"unhandled exception" | intext:"stack trace"'},
    {id:"er3",label:"PHP warnings / errors",q:'site:{target} intext:"undefined index" | intext:"Warning: include" | intext:"Parse error" | intext:"Notice: Undefined"'},
    {id:"er4",label:"IIS / ASP.NET errors",q:'site:{target} intitle:"Server Error in" intext:"Application" intitle:"Runtime Error"'},
    {id:"er5",label:"404/debug pages with paths",q:'site:{target} intext:"Application root:" | intext:"Physical path:" | intitle:"404" intext:"/var/www"'},
    {id:"er6",label:"Java / Tomcat exceptions",q:'site:{target} intitle:"Apache Tomcat" | intext:"java.lang.NullPointerException" | intext:"at org.apache"'},
  ]},
  {id:"subdomains",name:"🌐 Subdomain & Asset Discovery",engines:["Google","Bing","Yandex"],insight:"HackerOne $1,500 bounty case: hunter used multi-asterisk Google dorks to find staging subdomains not in any enumeration tool.",dorks:[
    {id:"sd1",label:"All subdomains",q:'site:*.{target}'},
    {id:"sd2",label:"Nested subdomains (multi-level)",q:'site:*.*.{target}'},
    {id:"sd3",label:"Dev/staging subdomains",q:'site:*.{target} inurl:staging | inurl:dev | inurl:test | inurl:uat | inurl:preprod'},
    {id:"sd4",label:"API subdomains",q:'site:api.{target} | site:api2.{target} | site:v2.{target} | site:gateway.{target}'},
    {id:"sd5",label:"Subdomains with admin paths",q:'site:*.{target} inurl:admin | inurl:portal | inurl:dashboard | inurl:manage'},
    {id:"sd6",label:"Yandex: CIS-indexed subdomains",q:'site:{target} | site:*.{target}'},
    {id:"sd7",label:"Cloud assets (S3, Azure, GCP)",q:'site:*.s3.amazonaws.com "{target}" | site:*.blob.core.windows.net "{target}" | site:storage.googleapis.com "{target}"'},
    {id:"sd8",label:"Old / archived subdomains",q:'site:{target} inurl:old | inurl:legacy | inurl:backup | inurl:archive | inurl:deprecated'},
  ]},
  {id:"open_redirect",name:"↪️ Open Redirects & SSRF Params",engines:["Google","Bing"],insight:"Hunters specifically target redirect parameters to chain with OAuth flows or find SSRF vectors.",dorks:[
    {id:"or1",label:"Redirect parameters",q:'site:{target} inurl:url= | inurl:return= | inurl:next= | inurl:redirect= | inurl:redir= | inurl:ret= | inurl:r2= | inurl:page= inurl:http'},
    {id:"or2",label:"Search / query parameters (XSS)",q:'site:{target} inurl:q= | inurl:s= | inurl:search= | inurl:query= | inurl:keyword= | inurl:lang= inurl:&'},
    {id:"or3",label:"SSRF-prone params",q:'site:{target} inurl:url= | inurl:uri= | inurl:path= | inurl:host= | inurl:to= | inurl:dest= | inurl:endpoint='},
    {id:"or4",label:"Callback / webhook params",q:'site:{target} inurl:callback= | inurl:webhook= | inurl:notify= | inurl:ping= | inurl:hook='},
  ]},
  {id:"cloud_infra",name:"☁️ Cloud & Infrastructure Leaks",engines:["Google","Shodan","Censys"],insight:"Shodan + Censys are used to find exposed services not indexed by Google. Favicon hash pivoting on Shodan reveals hidden assets.",dorks:[
    {id:"ci1",label:"Exposed MongoDB",q:'mongodb port:27017 org:"{target}"'},
    {id:"ci2",label:"Exposed Elasticsearch",q:'port:9200 org:"{target}" http.title:"Elasticsearch"'},
    {id:"ci3",label:"Open Redis instances",q:'port:6379 org:"{target}" redis_version'},
    {id:"ci4",label:"Exposed Docker APIs",q:'port:2375 org:"{target}" product:"Docker"'},
    {id:"ci5",label:"RDP exposed (3389)",q:'org:"{target}" port:3389 os:windows'},
    {id:"ci6",label:"Kubernetes API server",q:'port:6443 org:"{target}" ssl.cert.subject.cn:kubernetes'},
    {id:"ci7",label:"Jenkins / CI on Shodan",q:'org:"{target}" http.title:"Dashboard [Jenkins]"'},
    {id:"ci8",label:"SSL certs with VPN in subdomain",q:'ssl.cert.subject.cn:"vpn.{target}"'},
    {id:"ci9",label:"Exposed Grafana",q:'org:"{target}" http.title:"Grafana" port:3000'},
    {id:"ci10",label:"Apache Struts / Tomcat exposed",q:'org:"{target}" http.title:"Apache Tomcat" http.status:200'},
  ]},
  {id:"github_leaks",name:"🐙 GitHub Code Leaks",engines:["GitHub"],insight:"GitHub dorking is one of the most high-yield techniques. Researchers have found AWS keys, internal API endpoints, and DB passwords in committed code.",dorks:[
    {id:"gh1",label:"API keys for target",q:'"{target}.com" "api_key" | "apikey" | "api_secret" | "access_token"'},
    {id:"gh2",label:".env files committed",q:'"{target}" filename:.env "SECRET" | "PASSWORD" | "KEY"'},
    {id:"gh3",label:"Internal endpoints exposed",q:'"{target}" "internal" | "staging" | "localhost" | "127.0.0.1" filename:*.js | filename:*.ts'},
    {id:"gh4",label:"AWS credentials",q:'"{target}" "AKIA" "aws_access_key_id" | "aws_secret_access_key"'},
    {id:"gh5",label:"Firebase / GCP configs",q:'"{target}" "firebase" "apiKey" | "databaseURL" | "storageBucket"'},
    {id:"gh6",label:"Private Slack tokens",q:'"{target}" "xoxp-" | "xoxb-" | "xoxa-"'},
    {id:"gh7",label:"Stripe / payment keys",q:'"{target}" "sk_live_" | "pk_live_" | "rk_live_"'},
    {id:"gh8",label:"JWT secrets",q:'"{target}" "jwt_secret" | "JWT_SECRET" | "jwt_key"'},
    {id:"gh9",label:"Internal config / YAML",q:'"{target}" filename:config.yml | filename:settings.py "password" | "secret"'},
    {id:"gh10",label:"Private repo clues",q:'org:{target} "internal" | "private" | "confidential" is:public'},
  ]},
  {id:"yandex_osint",name:"🔴 Yandex OSINT (CIS / Unique Indexed)",engines:["Yandex"],insight:"Yandex indexes CIS-region infrastructure, older forgotten pages, and content inaccessible to Google.",dorks:[
    {id:"ya1",label:"All indexed subdomains on Yandex",q:'site:{target}'},
    {id:"ya2",label:"Config / env files",q:'site:{target} url:*.env | url:*.conf | url:config.php'},
    {id:"ya3",label:"Exposed document files",q:'site:{target} mime:application/pdf | mime:application/msword "confidential"'},
    {id:"ya4",label:"Login panels Yandex-indexed",q:'site:{target} title:"login" | title:"admin" | title:"dashboard"'},
    {id:"ya5",label:"Cached deleted pages",q:'cache:{target}'},
    {id:"ya6",label:"Cyrillic / multilingual assets",q:'site:{target} lang:ru | lang:uk'},
    {id:"ya7",label:"Old forgotten pages",q:'site:{target} title:"under construction" | title:"coming soon" | title:"test page"'},
  ]},
  {id:"cms_vulns",name:"🧩 CMS & Framework Vulnerabilities",engines:["Google","Bing"],insight:"Finding specific CMS versions lets researchers cross-reference CVEs. WordPress plugins are the most common CMS vector reported in bug bounties.",dorks:[
    {id:"cms1",label:"WordPress version disclosure",q:'site:{target} inurl:/wp-content/plugins | inurl:/wp-includes intext:"WordPress"'},
    {id:"cms2",label:"Drupal login / admin",q:'site:{target} intext:"Powered by" intext:Drupal inurl:user'},
    {id:"cms3",label:"Joomla login page",q:'site:{target} inurl:/joomla/login | inurl:/administrator/index.php'},
    {id:"cms4",label:"Magento admin",q:'site:{target} inurl:/admin/index.php?route=common'},
    {id:"cms5",label:"Exposed wp-config.php",q:'site:{target} inurl:wp-config.php | intext:"DB_NAME" "DB_PASSWORD"'},
    {id:"cms6",label:"Exposed Strapi CMS",q:'site:{target} inurl:/admin intitle:"Strapi"'},
    {id:"cms7",label:"Django admin exposed",q:'site:{target} inurl:/django-admin | intitle:"Django administration"'},
  ]},
  {id:"network_exposure",name:"🔌 Network & IoT Exposure",engines:["Shodan","Censys"],insight:"Shodan-based recon reveals forgotten IPs, exposed industrial systems, and camera feeds.",dorks:[
    {id:"ne1",label:"Open webcams",q:'org:"{target}" webcam | "Network Camera" port:80,8080'},
    {id:"ne2",label:"Fortinet VPN (CVE-2018-13379)",q:'org:"{target}" "Fortinet" ssl http.title:"SSL VPN"'},
    {id:"ne3",label:"Cisco ASA / Firepower",q:'org:"{target}" http.title:"Cisco ASDM" | "Cisco Adaptive Security"'},
    {id:"ne4",label:"Exposed SMB (port 445)",q:'org:"{target}" port:445 os:windows'},
    {id:"ne5",label:"FTP anonymous access",q:'org:"{target}" port:21 "230 Login successful" "anonymous"'},
    {id:"ne6",label:"SMTP servers exposed",q:'org:"{target}" port:25 "220 smtp"'},
    {id:"ne7",label:"Printers / networked devices",q:'org:"{target}" port:631 | port:9100 "HP" | "Canon" | "Xerox"'},
  ]},
  {id:"program_discovery",name:"🎯 Bug Bounty Program Discovery",engines:["Google","Bing"],insight:"Researchers use dorks to find private/unlisted programs not on HackerOne or Bugcrowd.",dorks:[
    {id:"pd1",label:"Find bug bounty / disclosure pages",q:'"submit your vulnerability" intitle:"bug bounty" | intitle:"responsible disclosure"'},
    {id:"pd2",label:"Embedded HackerOne forms",q:'"powered by hackerone" "submit vulnerability report"'},
    {id:"pd3",label:"security.txt files with bounty",q:'site:*/security.txt "bounty"'},
    {id:"pd4",label:"PDF bounty policies",q:'filetype:pdf inurl:"bug-bounty-policy" | intitle:"vulnerability disclosure policy"'},
    {id:"pd5",label:"Gov / edu disclosure programs",q:'site:*.gov | site:*.edu "report a vulnerability" | "responsible disclosure"'},
    {id:"pd6",label:"Hall of fame pages (self-hosted)",q:'"bug bounty hall of fame" -site:hackerone.com -site:bugcrowd.com'},
  ]},
];

// State
let checked={}, expanded={}, activeOnly=false;
const allIds=CATEGORIES.flatMap(c=>c.dorks.map(d=>d.id));

// Init engine select
const sel=document.getElementById('engine');
ENGINES.forEach(e=>{
  const o=document.createElement('option');
  o.value=e; o.textContent=e;
  o.style.color=ENGINE_COLORS[e];
  sel.appendChild(o);
});
sel.style.color=ENGINE_COLORS[ENGINES[0]];
sel.addEventListener('change',()=>{sel.style.color=ENGINE_COLORS[sel.value];render();});

function getTarget(){return document.getElementById('target').value.trim();}
function getEngine(){return document.getElementById('engine').value;}
function getSearch(){return document.getElementById('search').value.toLowerCase();}
function fillDork(q){const t=getTarget();return t?q.replace(/\{target\}/g,t):q;}

function toggleActive(){
  activeOnly=!activeOnly;
  const btn=document.getElementById('btnActive');
  btn.textContent=activeOnly?'✓ Unchecked only':'All dorks';
  btn.classList.toggle('active',activeOnly);
  render();
}
function resetAll(){checked={};render();}

function toggleCheck(id){
  checked[id]=!checked[id];
  render();
}
function toggleExpand(id){
  expanded[id]=expanded[id]===false?true:false;
  render();
}

function copyDork(q,btnId){
  const text=fillDork(q);
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){btn.textContent='✓';setTimeout(()=>{btn.textContent='📋';},1500);}
  });
}
function openDork(q){
  const eng=getEngine();
  const url=ENGINE_URLS[eng]?.(fillDork(q));
  if(url)window.open(url,'_blank');
}

function render(){
  const search=getSearch();
  const eng=getEngine();

  // Progress
  const done=allIds.filter(id=>checked[id]).length;
  const pct=Math.round(done/allIds.length*100);
  document.getElementById('progLabel').textContent=`${done}/${allIds.length} dorks run (${pct}%)`;
  document.getElementById('progFill').style.width=pct+'%';

  const container=document.getElementById('cats');
  container.innerHTML='';

  CATEGORIES.forEach(cat=>{
    const filtDorks=cat.dorks.filter(d=>{
      const ms=!search||d.label.toLowerCase().includes(search)||d.q.toLowerCase().includes(search);
      const ma=!activeOnly||!checked[d.id];
      return ms&&ma;
    });
    if(!filtDorks.length)return;

    const catDone=filtDorks.filter(d=>checked[d.id]).length;
    const catPct=Math.round(catDone/filtDorks.length*100);
    const isOpen=expanded[cat.id]!==false;

    const div=document.createElement('div');
    div.className='category';

    // Engine tags
    const tags=cat.engines.map(e=>`<span class="engine-tag" style="color:${ENGINE_COLORS[e]};border:1px solid ${ENGINE_COLORS[e]}44">${e}</span>`).join(' ');

    div.innerHTML=`
      <div class="cat-header" onclick="toggleExpand('${cat.id}')">
        <span class="cat-name">${cat.name}</span>
        <span style="display:flex;gap:6px;flex-wrap:wrap">${tags}</span>
        <span class="cat-count" style="color:${catDone===filtDorks.length?'#4fffb0':'#556'}">${catDone}/${filtDorks.length}</span>
        <span class="cat-arrow">${isOpen?'▲':'▼'}</span>
      </div>
      <div class="cat-body ${isOpen?'open':''}">
        <div class="insight">💡 ${cat.insight}</div>
        <div class="cat-prog"><div class="cat-prog-fill" style="width:${catPct}%;background:${catPct===100?'#4fffb0':'#4f8eff'}"></div></div>
        ${filtDorks.map(d=>{
          const filled=fillDork(d.q);
          const isDone=!!checked[d.id];
          const btnId='btn_'+d.id;
          return `<div class="dork-row ${isDone?'done':''}">
            <input type="checkbox" ${isDone?'checked':''} onchange="toggleCheck('${d.id}')"/>
            <div class="dork-info">
              <div class="dork-label">${d.label}</div>
              <div class="dork-query" title="${filled.replace(/"/g,'&quot;')}">${filled}</div>
            </div>
            <button class="btn-copy" id="${btnId}" onclick="copyDork('${d.q.replace(/'/g,"\\'")}','${btnId}')">📋</button>
            <button class="btn-open" style="border:1px solid ${ENGINE_COLORS[eng]||'#7df9ff'}44;color:${ENGINE_COLORS[eng]||'#7df9ff'}" onclick="openDork('${d.q.replace(/'/g,"\\'")}')">↗</button>
          </div>`;
        }).join('')}
      </div>
    `;
    container.appendChild(div);
  });
}

render();
</script>
</body>
</html>
